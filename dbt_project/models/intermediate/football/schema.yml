version: 2

models:
  - name: int_team_form
    description: >
      Forma recente de cada time calculada com janelas deslizantes de 5 e 10 jogos.
      Combina perspectiva home e away. Usa o macro rolling_avg.
      Grain: uma linha por time por partida (registro de participação).
    columns:
      - name: fixture_id
        description: "FK para stg_fixtures."
        data_tests:
          - not_null
      - name: team_id
        description: "Identificador do time."
        data_tests:
          - not_null
      - name: league_id
        data_tests:
          - not_null
      - name: season
        data_tests:
          - not_null
      - name: points
        description: "Pontos obtidos na partida (3/1/0)."
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1, 3]
      - name: win_rate_l5
        description: "Taxa de vitória nos últimos 5 jogos (0 a 1)."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1
      - name: win_rate_l10
        description: "Taxa de vitória nos últimos 10 jogos (0 a 1)."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 1

  - name: int_head_to_head
    description: >
      Estatísticas de confrontos diretos dos últimos 5 jogos entre cada par de times.
      O par é normalizado (menor team_id = team_a). Grain: uma linha por par (team_a, team_b).
    columns:
      - name: team_a_id
        description: "Time com menor ID no par."
        data_tests:
          - not_null
      - name: team_b_id
        description: "Time com maior ID no par."
        data_tests:
          - not_null
      - name: h2h_total_matches
        description: "Número de confrontos considerados (máx 5)."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 1
              max_value: 5
      - name: h2h_avg_goals
        description: "Média de gols por partida nos H2H."
        data_tests:
          - not_null

  - name: int_match_features
    description: >
      Vetor de features completo por partida para uso em modelos de ML.
      Combina stg_fixtures + int_team_form (home e away) + int_head_to_head + stg_odds.
      Grain: uma linha por partida finalizada.
    columns:
      - name: fixture_id
        description: "PK — identificador único da partida."
        data_tests:
          - not_null
          - unique
      - name: league_id
        data_tests:
          - not_null
      - name: home_team_id
        description: "FK para dim_team_football."
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_teams_football')
              field: team_id
      - name: away_team_id
        description: "FK para dim_team_football."
        data_tests:
          - not_null
          - relationships:
              to: ref('stg_teams_football')
              field: team_id
      - name: match_result
        description: "Variável alvo: HOME_WIN | DRAW | AWAY_WIN"
        data_tests:
          - not_null
          - accepted_values:
              values: ['HOME_WIN', 'DRAW', 'AWAY_WIN']
      - name: home_goals
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 30
      - name: away_goals
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 30
