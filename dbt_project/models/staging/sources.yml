version: 2

sources:
  - name: raw
    description: "Dados brutos ingeridos via API ou ETL — schema raw no PostgreSQL."
    database: dataplatform
    schema: raw
    freshness:
      warn_after: {count: 12, period: hour}
      error_after: {count: 24, period: hour}

    tables:
      - name: matches
        description: "Partidas brutas da API. Grain: uma linha por partida."
        loaded_at_field: loaded_at
        columns:
          - name: match_id
            description: "Identificador único da partida."
            data_tests:
              - not_null
              - unique
          - name: match_date
            description: "Data da partida."
            data_tests:
              - not_null
          - name: home_team_id
            data_tests:
              - not_null
          - name: away_team_id
            data_tests:
              - not_null
          - name: home_goals
            data_tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 30
          - name: away_goals
            data_tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_between:
                  min_value: 0
                  max_value: 30

      - name: teams
        description: "Cadastro de times. Grain: uma linha por time."
        loaded_at_field: updated_at
        columns:
          - name: team_id
            data_tests:
              - not_null
              - unique
          - name: team_name
            data_tests:
              - not_null

      - name: team_roster
        description: "Elenco dos times. Grain: uma linha por jogador."
        loaded_at_field: updated_at
        columns:
          - name: player_id
            data_tests:
              - not_null
              - unique
