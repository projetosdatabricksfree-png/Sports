# =============================================================================
# CloudBeaver 24.3.5 — DBeaver Web (interface web para PostgreSQL e demais DBs)
# URL: http://localhost:8978  |  user: admin / senha: admin
# Nota: DBeaver CE é desktop. CloudBeaver é a versão web oficial da DBeaver Corp.
# =============================================================================
services:
  cloudbeaver:
    image: dbeaver/cloudbeaver:24.3.5
    container_name: cloudbeaver
    restart: unless-stopped
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    environment:
      CB_ADMIN_NAME: admin
      CB_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8978/status"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - dataplatform_net

volumes:
  cloudbeaver_data:
    driver: local

networks:
  dataplatform_net:
    external: true
