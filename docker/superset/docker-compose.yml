# =============================================================================
# Apache Superset 4.1.2 — BI e visualização
# URL: http://localhost:8088  |  user: admin / senha: admin
# Depende de: postgres (dataplatform_net)
# =============================================================================
services:
  superset:
    image: apache/superset:4.1.2
    container_name: superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: CHANGE_THIS_TO_A_RANDOM_SECRET_KEY_IN_PRODUCTION
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: admin
      DATABASE_PASSWORD: admin
      DATABASE_DB: superset_metadata
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset_config.py:/app/pythonpath/superset_config.py
    command: >
      bash -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@dataplatform.com
          --password admin || true &&
        superset init &&
        superset run -p 8088 --with-threads --reload --debugger
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/health"]
      interval: 30s
      timeout: 15s
      retries: 5
    depends_on:
      - postgres
    networks:
      - dataplatform_net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: dataplatform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dataplatform"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataplatform_net

volumes:
  superset_home:
    driver: local
  postgres_data:
    driver: local

networks:
  dataplatform_net:
    external: true
