# =============================================================================
# PostgreSQL 16 — Metadata store for Airflow, Superset e dbt target
# Porta: 5432
# =============================================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-dataplatform}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-dataplatform}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dataplatform_net

volumes:
  postgres_data:
    driver: local

networks:
  dataplatform_net:
    external: true
