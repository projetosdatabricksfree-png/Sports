version: '3.8'

services:
  mlflow:
    image: python:3.12-slim
    container_name: mlflow
    restart: unless-stopped
    command: >
      bash -c "pip install --quiet mlflow psycopg2-binary boto3 &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri postgresql://admin:admin@postgres:5432/mlflow_metadata
               --default-artifact-root /mlflow/artifacts
               --serve-artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    environment:
      MLFLOW_TRACKING_URI: http://localhost:5000
    networks:
      - dataplatform_net
    depends_on:
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  mlflow_artifacts:

networks:
  dataplatform_net:
    external: true
